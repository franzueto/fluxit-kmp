<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Create New List</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2b7cee",
                        "background-light": "#f6f7f8",
                        "background-dark": "#101822",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .active-ring {
            box-shadow: 0 0 0 2px #2b7cee;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-white min-h-screen flex flex-col">
<header class="sticky top-0 z-10 bg-background-light dark:bg-background-dark/95 backdrop-blur-md px-4 py-4 flex items-center justify-between border-b border-slate-200 dark:border-slate-800">
<button class="text-primary font-medium text-lg">Cancel</button>
<h1 class="text-lg font-bold tracking-tight">New List</h1>
<div class="w-12"></div> <!-- Spacer for balance -->
</header>
<main class="flex-1 overflow-y-auto pb-32">
<div class="max-w-md mx-auto">
<section class="px-4 py-6">
<div class="flex flex-col gap-2">
<label class="text-sm font-semibold text-slate-500 dark:text-slate-400 uppercase tracking-wider px-1">List Name</label>
<input class="w-full h-14 bg-white dark:bg-[#1c2027] border border-slate-200 dark:border-[#3b4554] rounded-xl px-4 text-lg focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all placeholder:text-slate-400 dark:placeholder:text-[#9da8b9]" placeholder="e.g., Summer Trip" type="text"/>
</div>
</section>
<section>
<h3 class="text-sm font-semibold text-slate-500 dark:text-slate-400 uppercase tracking-wider px-5 pb-3">Choose Icon</h3>
<div class="grid grid-cols-4 gap-3 px-4">
<button class="aspect-square flex flex-col items-center justify-center gap-2 rounded-xl border-2 border-primary bg-primary/10 text-primary">
<span class="material-symbols-outlined text-3xl">shopping_cart</span>
</button>
<button class="aspect-square flex flex-col items-center justify-center gap-2 rounded-xl border border-slate-200 dark:border-[#3b4554] bg-white dark:bg-[#1c2027] text-slate-700 dark:text-white">
<span class="material-symbols-outlined text-3xl">home</span>
</button>
<button class="aspect-square flex flex-col items-center justify-center gap-2 rounded-xl border border-slate-200 dark:border-[#3b4554] bg-white dark:bg-[#1c2027] text-slate-700 dark:text-white">
<span class="material-symbols-outlined text-3xl">work</span>
</button>
<button class="aspect-square flex flex-col items-center justify-center gap-2 rounded-xl border border-slate-200 dark:border-[#3b4554] bg-white dark:bg-[#1c2027] text-slate-700 dark:text-white">
<span class="material-symbols-outlined text-3xl">flight</span>
</button>
<button class="aspect-square flex flex-col items-center justify-center gap-2 rounded-xl border border-slate-200 dark:border-[#3b4554] bg-white dark:bg-[#1c2027] text-slate-700 dark:text-white">
<span class="material-symbols-outlined text-3xl">restaurant</span>
</button>
<button class="aspect-square flex flex-col items-center justify-center gap-2 rounded-xl border border-slate-200 dark:border-[#3b4554] bg-white dark:bg-[#1c2027] text-slate-700 dark:text-white">
<span class="material-symbols-outlined text-3xl">fitness_center</span>
</button>
<button class="aspect-square flex flex-col items-center justify-center gap-2 rounded-xl border border-slate-200 dark:border-[#3b4554] bg-white dark:bg-[#1c2027] text-slate-700 dark:text-white">
<span class="material-symbols-outlined text-3xl">star</span>
</button>
<button class="aspect-square flex flex-col items-center justify-center gap-2 rounded-xl border border-slate-200 dark:border-[#3b4554] bg-white dark:bg-[#1c2027] text-slate-700 dark:text-white">
<span class="material-symbols-outlined text-3xl">more_horiz</span>
</button>
</div>
</section>
<section class="mt-8">
<h3 class="text-sm font-semibold text-slate-500 dark:text-slate-400 uppercase tracking-wider px-5 pb-4">List Color</h3>
<div class="flex flex-wrap justify-between gap-4 px-5">
<button class="w-10 h-10 rounded-full bg-primary ring-offset-4 ring-offset-background-light dark:ring-offset-background-dark ring-2 ring-primary"></button>
<button class="w-10 h-10 rounded-full bg-rose-500"></button>
<button class="w-10 h-10 rounded-full bg-emerald-500"></button>
<button class="w-10 h-10 rounded-full bg-amber-500"></button>
<button class="w-10 h-10 rounded-full bg-violet-500"></button>
<button class="w-10 h-10 rounded-full bg-sky-400"></button>
</div>
</section>
<section class="mt-8 px-4">
<div class="p-4 bg-slate-100 dark:bg-[#1c2027] border border-slate-200 dark:border-[#3b4554] rounded-xl flex items-center justify-between">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-slate-500">notifications</span>
<span class="font-medium">Reminder Settings</span>
</div>
<span class="material-symbols-outlined text-slate-400">chevron_right</span>
</div>
</section>
</div>
</main>
<footer class="fixed bottom-0 left-0 right-0 p-4 bg-gradient-to-t from-background-light dark:from-background-dark via-background-light/90 dark:via-background-dark/90 to-transparent">
<div class="max-w-md mx-auto">
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 rounded-xl shadow-lg shadow-primary/20 transition-all active:scale-[0.98]">
                Create List
            </button>
</div>
</footer>
</body></html>
