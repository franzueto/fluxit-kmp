<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Item Details &amp; Photo</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#2b7cee",
              "background-light": "#f6f7f8",
              "background-dark": "#101822",
            },
            fontFamily: {
              "display": ["Inter", "sans-serif"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-white min-h-screen">
<div class="relative flex h-auto min-h-screen w-full max-w-md mx-auto flex-col bg-background-light dark:bg-background-dark overflow-x-hidden">
<!-- TopAppBar -->
<div class="sticky top-0 z-10 flex items-center bg-background-light dark:bg-background-dark p-4 pb-2 justify-between border-b border-slate-200 dark:border-slate-800">
<div class="text-primary flex size-12 shrink-0 items-center cursor-pointer">
<span class="material-symbols-outlined text-3xl">chevron_left</span>
<span class="text-base font-medium -ml-1">Lists</span>
</div>
<h2 class="text-slate-900 dark:text-white text-lg font-bold leading-tight tracking-[-0.015em] flex-1 text-center">Edit Item</h2>
<div class="flex w-12 items-center justify-end cursor-pointer">
<p class="text-primary text-base font-bold leading-normal tracking-[0.015em] shrink-0">Save</p>
</div>
</div>
<div class="flex flex-col gap-2 p-4">
<!-- SectionHeader -->
<h3 class="text-slate-900 dark:text-white text-lg font-bold leading-tight tracking-[-0.015em] pt-2">General Info</h3>
<!-- TextField (Item Name) -->
<div class="flex flex-wrap items-end gap-4 py-3">
<label class="flex flex-col min-w-40 flex-1">
<p class="text-slate-600 dark:text-slate-400 text-sm font-medium leading-normal pb-2 uppercase tracking-wider">Item Name</p>
<input class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-xl text-slate-900 dark:text-white focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-slate-300 dark:border-[#3b4554] bg-white dark:bg-[#1c2027] h-14 placeholder:text-slate-400 dark:placeholder:text-[#9da8b9] p-[15px] text-base font-normal leading-normal" type="text" value="Organic Almond Milk"/>
</label>
</div>
<!-- TextField (Description) -->
<div class="flex flex-wrap items-end gap-4 py-3">
<label class="flex flex-col min-w-40 flex-1">
<p class="text-slate-600 dark:text-slate-400 text-sm font-medium leading-normal pb-2 uppercase tracking-wider">Description</p>
<textarea class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-xl text-slate-900 dark:text-white focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-slate-300 dark:border-[#3b4554] bg-white dark:bg-[#1c2027] min-h-32 placeholder:text-slate-400 dark:placeholder:text-[#9da8b9] p-[15px] text-base font-normal leading-normal" placeholder="Add notes, store location, or details...">Unsweetened vanilla flavor. Check the expiration date carefully. Usually found in the dairy alternative aisle near the back.</textarea>
</label>
</div>
<!-- SectionHeader -->
<div class="flex items-center justify-between pt-4">
<h3 class="text-slate-900 dark:text-white text-lg font-bold leading-tight tracking-[-0.015em]">Item Photo</h3>
<button class="text-primary text-sm font-semibold flex items-center gap-1">
<span class="material-symbols-outlined text-xl">add_a_photo</span>
                    Update
                </button>
</div>
<!-- ImageGrid (Main Photo) -->
<div class="py-4">
<div class="relative group">
<div class="w-full bg-center bg-no-repeat aspect-[4/3] bg-cover rounded-xl shadow-lg border border-slate-200 dark:border-slate-800" data-alt="Close up photo of an almond milk carton" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuDR7Av2pA-qq7eUPq1NhlSfYwxEgcJNs-8OTWvityO-bgYlP18YXLUauy_VNUpI6FznrxZUNxTMwYimjPS-tbRCpy2V1Q7oit42z8GtktmCepHj_zvr8lwsh_3bdWh0hCZ68G4K3ZZ72ajHtlF2IxhrrKXUs_hBMaYXrf9NnPhhEyuuTShvmQeO9I3uRqNkBQMGoPrDiBL0qf1zYK76bqJ6CN9-_vBlU7c7g_HoS05zhkoGrB8g6oFLR33Of6UGmqVDnxC5qleV6Is");'>
</div>
<div class="absolute inset-0 bg-black/20 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center rounded-xl pointer-events-none">
<span class="material-symbols-outlined text-white text-4xl">zoom_in</span>
</div>
</div>
</div>
<!-- Destructive Action -->
<div class="mt-8 mb-12 px-4 flex flex-col items-center">
<button class="w-full flex items-center justify-center gap-2 py-4 rounded-xl text-red-500 font-semibold border border-red-500/20 bg-red-500/5 hover:bg-red-500/10 transition-colors">
<span class="material-symbols-outlined">delete</span>
                    Delete Item
                </button>
<p class="mt-4 text-slate-400 text-xs text-center">Last edited on Oct 24, 2023</p>
</div>
</div>
<!-- Spacer for iOS bottom home indicator -->
<div class="h-8 bg-background-light dark:bg-background-dark"></div>
</div>
</body></html>
