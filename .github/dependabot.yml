# Dependabot configuration — Phase 01 §10.
# Docs: https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  # Gradle: KMP modules, build-logic composite, and the Gradle wrapper
  # are all under the repo root. Dependabot scans the version catalog
  # (gradle/libs.versions.toml) and every build.gradle.kts.
  - package-ecosystem: "gradle"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "gradle"
    commit-message:
      prefix: "build(deps)"
      include: "scope"
    groups:
      kotlin:
        patterns:
          - "org.jetbrains.kotlin*"
          - "org.jetbrains.kotlinx*"
      androidx:
        patterns:
          - "androidx.*"
      compose:
        patterns:
          - "androidx.compose*"
    ignore:
      # SKIE (iOS Swift bridging, co.touchlab.skie) supports Kotlin only up to
      # 2.3.10 — see the "must be bumped together" note in gradle/libs.versions.toml
      # and the #28 toolchain PR. Kotlin 2.4.x cannot be adopted until SKIE ships
      # 2.4 support, so block it here to stop dependabot re-opening the
      # un-mergeable bump every week (it already churned via #19 -> #29).
      # kotlinx.* is intentionally NOT ignored — it isn't gated by SKIE.
      # ACTION: remove this entry once SKIE supports Kotlin 2.4+.
      - dependency-name: "org.jetbrains.kotlin:*"
        versions: [">=2.4.0"]

  # GitHub Actions used in .github/workflows/*.yml.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "ci(deps)"
      include: "scope"
