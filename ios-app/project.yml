name: FluxIt
options:
  bundleIdPrefix: dev.franzueto
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    DEVELOPMENT_TEAM: ""
    SWIFT_VERSION: "5.10"
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
    # The Shared framework now embeds SQLDelight's native driver (sqliter) via
    # :shared:state → :shared:data (ADR-015 composition root). sqliter calls
    # libsqlite3 through cinterop, so the app + test bundle must link the
    # system SQLite. (Phase 06's real composition root keeps this dependency.)
    OTHER_LDFLAGS: "-lsqlite3"

targets:
  FluxIt:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: Sources
      # Generated by :core:core-designsystem:generateTokens (ADR-005). The
      # directory is gitignored; scripts/build-ios.sh regenerates it before
      # `xcodegen generate` runs. `optional: true` keeps fresh checkouts that
      # have not yet run the generator from failing the xcodegen pass.
      - path: Generated
        optional: true
      # Bundled resources (fonts, license files). Inter-Variable.ttf is
      # registered via Info.plist UIAppFonts below.
      - path: Resources
    info:
      path: Sources/Info.plist
      properties:
        UILaunchScreen: {}
        CFBundleDisplayName: FluxIt
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIAppFonts:
          - Inter-Variable.ttf
        # Phase 10 photo capture — UIImagePickerController hard-crashes the app
        # when presented without these privacy strings (camera + photo library).
        NSCameraUsageDescription: FluxIt uses the camera to add a photo to an item.
        NSPhotoLibraryUsageDescription: FluxIt accesses your photo library so you can choose a photo for an item.
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.franzueto.fluxit
        TARGETED_DEVICE_FAMILY: "1,2"
        GENERATE_INFOPLIST_FILE: NO
        SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
        # FluxItIcons.xcassets (ADR-005a) is an icons-only catalog with no
        # AppIcon.appiconset; clear the app-icon name so actool doesn't fail
        # looking for one. A real AppIcon lands in Phase 17 release hardening.
        ASSETCATALOG_COMPILER_APPICON_NAME: ""
    dependencies:
      - framework: ../shared/state/build/XCFrameworks/release/Shared.xcframework
        embed: true
    scheme:
      testTargets:
        - FluxItTests
      gatherCoverageData: false

  # Phase 05 §12/§15 — SKIE bridging smoke. A unit-test bundle hosted by the
  # FluxIt app; links the same Shared.xcframework (link-only, the host app
  # already embeds it) and imports `Shared` to exercise the store surface.
  FluxItTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: Tests
    dependencies:
      - target: FluxIt
      - framework: ../shared/state/build/XCFrameworks/release/Shared.xcframework
        embed: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.franzueto.fluxit.tests
        GENERATE_INFOPLIST_FILE: YES
        SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
